services:
  # CLI ponctuelle: ce service ne lance pas le serveur.
  # Exemples:
  #   docker compose run --rm wiki ingest
  #   docker compose run --rm wiki doctor
  #   docker compose run --rm wiki build
  #
  # Pour garder une UI web ouverte, utiliser le service `serve` ci-dessous.
  # Les deux services montent le même workspace: un ingest lancé via `wiki`
  # est visible dans `serve` après rechargement du navigateur.
  wiki:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    profiles: ['cli']
    volumes:
      - ${WIKI_WORKSPACE:-.}:/workspace
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    # host.docker.internal → Ollama natif macOS ou autre service hôte
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Serveur web persistant pour consulter le wiki.
  # Démarrage:
  #   docker compose up serve
  #
  # `EXPOSE 3000` dans le Dockerfile ne démarre rien tout seul: seul ce service
  # passe explicitement la commande `serve --port 3000`.
  serve:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: serve --port 3000
    volumes:
      - ${WIKI_WORKSPACE:-.}:/workspace
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    ports:
      - '3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Serveur MCP stdio pour connecter un assistant IA (Claude Desktop / Claude Code).
  # Ce service n'est pas destiné à être lancé directement via docker compose:
  # le transport stdio exige que le client MCP spawn le processus lui-même.
  # Utiliser le binaire local `wiki mcp` depuis le workspace.
  # Voir la section "MCP integration" du README pour la configuration.
  mcp:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: mcp
    profiles: ['mcp']
    volumes:
      - ${WIKI_WORKSPACE:-.}:/workspace
    environment:
      - WIKI_MCP_ACCESS_KEY
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Serveur MCP Streamable HTTP / HTTPS.
  # Démarrage HTTP:
  #   docker compose --profile mcp-http up mcp-http
  #
  # Configuration:
  #   - clé serveur: mcp.accessKey dans .wikirc.yaml ou WIKI_MCP_ACCESS_KEY
  #   - certificats: mcp.tls.* dans .wikirc.yaml ou variables WIKI_MCP_TLS_*
  #
  # Démarrage HTTPS via Docker seul:
  #   WIKI_MCP_ACCESS_KEY=your-secret-key \
  #   WIKI_MCP_TLS_CERT_PATH=/certs/fullchain.pem \
  #   WIKI_MCP_TLS_KEY_PATH=/certs/privkey.pem \
  #   WIKI_CERTS=/absolute/path/to/certs \
  #   docker compose --profile mcp-http up mcp-http
  #
  # Démarrage HTTPS via .wikirc.yaml:
  #   - monter les certificats dans ${WIKI_CERTS:-./certs}:/certs:ro
  #   - configurer:
  #       mcp:
  #         accessKey: your-secret-key
  #         tls:
  #           certPath: /certs/fullchain.pem
  #           keyPath: /certs/privkey.pem
  #           caPath: /certs/ca.pem
  #   - lancer le même service; il bascule en HTTPS si certPath/keyPath existent.
  #
  # Endpoint client: http(s)://HOST:3333/mcp
  # Auth: Authorization: Bearer <mcp.accessKey>
  mcp-http:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: mcp-http --host 0.0.0.0 --port 3333 --path /mcp
    profiles: ['mcp-http']
    volumes:
      - ${WIKI_WORKSPACE:-.}:/workspace
      - ${WIKI_CERTS:-./certs}:/certs:ro
    environment:
      - WIKI_MCP_ACCESS_KEY
      - WIKI_MCP_TLS_CERT_PATH
      - WIKI_MCP_TLS_KEY_PATH
      - WIKI_MCP_TLS_CA_PATH
    ports:
      - '${WIKI_MCP_HTTP_PORT:-3333}:3333'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Ollama conteneurisé — Linux + GPU NVIDIA uniquement.
  # Sur macOS, lancer Ollama nativement et pointer baseUrl sur host.docker.internal.
  #
  # Décommenter ce bloc si tu veux gérer Ollama dans Docker:
  #
  # ollama:
  #   image: ollama/ollama
  #   profiles: [gpu]
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   ports:
  #     - '11434:11434'
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #
  # volumes:
  #   ollama-data:
