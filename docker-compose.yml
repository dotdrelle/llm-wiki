services:
  # One-off CLI service: this service does not start the web server.
  # Examples:
  #   docker compose run --rm wiki ingest
  #   docker compose run --rm wiki doctor
  #   docker compose run --rm wiki build
  #   docker compose run --rm wiki index   # build or refresh the vector index
  #
  # To keep the web UI running, use the `serve` service below.
  # Both services mount the same workspace: an ingest run through `wiki`
  # is visible in `serve` after refreshing the browser.
  # WIKI_WORKSPACE is required; do not default to the source checkout.
  wiki:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    profiles: ['cli']
    volumes:
      - ${WIKI_WORKSPACE:?Set WIKI_WORKSPACE to an initialized llm-wiki workspace}:/workspace
    environment:
      - WIKI_WORKSPACE=/workspace
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    # host.docker.internal -> native macOS Ollama or another host service
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Persistent web server for browsing the wiki.
  # Start:
  #   docker compose up serve
  #
  # `EXPOSE 3000` in the Dockerfile does not start anything by itself:
  # only this service explicitly runs `serve --port 3000`.
  serve:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: serve --port 3000
    volumes:
      - ${WIKI_WORKSPACE:?Set WIKI_WORKSPACE to an initialized llm-wiki workspace}:/workspace
    environment:
      - WIKI_WORKSPACE=/workspace
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    ports:
      - '3100:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  # MCP stdio server for connecting an AI assistant (Claude Desktop / Claude Code).
  # This service is not meant to be started directly through docker compose:
  # stdio transport requires the MCP client to spawn the process itself.
  # Use the local `wiki mcp` binary from the workspace.
  # See the README "MCP integration" section for configuration.
  mcp:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: mcp
    profiles: ['mcp']
    volumes:
      - ${WIKI_WORKSPACE:?Set WIKI_WORKSPACE to an initialized llm-wiki workspace}:/workspace
    environment:
      - WIKI_WORKSPACE=/workspace
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # MCP Streamable HTTP / HTTPS server.
  # HTTP start:
  #   docker compose --profile mcp-http up mcp-http
  #
  # Configuration:
  #   - server key: mcp.accessKey in .wikirc.yaml
  #   - certificates: mcp.tls.* in .wikirc.yaml or WIKI_MCP_TLS_* variables
  #
  # HTTPS start with Docker only:
  #   WIKI_MCP_TLS_CERT_PATH=/certs/fullchain.pem \
  #   WIKI_MCP_TLS_KEY_PATH=/certs/privkey.pem \
  #   WIKI_CERTS=/absolute/path/to/certs \
  #   docker compose --profile mcp-http up mcp-http
  #
  # HTTPS start through .wikirc.yaml:
  #   - mount certificates with ${WIKI_CERTS:-./certs}:/certs:ro
  #   - configure:
  #       mcp:
  #         accessKey: your-secret-key
  #         tls:
  #           certPath: /certs/fullchain.pem
  #           keyPath: /certs/privkey.pem
  #           caPath: /certs/ca.pem
  #   - start the same service; it switches to HTTPS when certPath/keyPath exist.
  #
  # Client endpoint: http(s)://HOST:${WIKI_MCP_HTTP_PORT:-3101}/mcp
  # Auth: Authorization: Bearer <mcp.accessKey>
  mcp-http:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    command: mcp-http --host 0.0.0.0 --port 3333 --path /mcp
    profiles: ['mcp-http']
    volumes:
      - ${WIKI_WORKSPACE:?Set WIKI_WORKSPACE to an initialized llm-wiki workspace}:/workspace
      - ${WIKI_CERTS:-./certs}:/certs:ro
    environment:
      - WIKI_WORKSPACE=/workspace
      - WIKI_MCP_TLS_CERT_PATH
      - WIKI_MCP_TLS_KEY_PATH
      - WIKI_MCP_TLS_CA_PATH
    ports:
      - '${WIKI_MCP_HTTP_PORT:-3101}:3333'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  # Containerized Ollama - Linux + NVIDIA GPU only.
  # On macOS, run Ollama natively and point baseUrl to host.docker.internal.
  #
  # Uncomment this block if you want Docker to manage Ollama:
  #
  # ollama:
  #   image: ollama/ollama
  #   profiles: [gpu]
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   ports:
  #     - '11434:11434'
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #
  # volumes:
  #   ollama-data:
