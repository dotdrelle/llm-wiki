# docker-compose.yml — llm-wiki workspace
#
# Run from this workspace directory:
#   docker compose up
#
# If another workspace is already running, change the host-side ports on the
# left side of each mapping. Convention: 3100/3101 for the first workspace,
# 3200/3201 for the second, and so on.
#
# CLI (profil cli) :
#   docker compose run --rm wiki ingest
#   docker compose run --rm wiki build
#   docker compose run --rm wiki index

services:
  serve:
    image: dotdrelle/llm-wiki:latest
    command: serve --port 3000
    volumes:
      - .:/workspace
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    ports:
      - '3100:3000' # Change if this host port is already used.
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  mcp-http:
    image: dotdrelle/llm-wiki:latest
    command: mcp-http --host 0.0.0.0 --port 3333 --path /mcp
    volumes:
      - .:/workspace
    environment:
      - WIKI_MCP_ACCESS_KEY
    ports:
      - '3101:3333' # Change if this host port is already used.
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  wiki:
    image: dotdrelle/llm-wiki:latest
    profiles: [cli]
    volumes:
      - .:/workspace
    environment:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    extra_hosts:
      - host.docker.internal:host-gateway
