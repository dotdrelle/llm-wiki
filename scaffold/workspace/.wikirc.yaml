language: en

llm:
  provider: openai-compatible
  baseUrl: https://mon-provider.example.com/v1
  model: YOUR_MODEL_NAME
  apiKey: YOUR_LLM_API_KEY

limits:
  # Maximum generation/chat requests started per minute for the LLM provider.
  requestsPerMinute: 60

build:
  # Default false: `ingest` only ingests, no deliverable is rebuilt.
  # Set to true to automatically chain, after every ingestion, a rebuild of
  # all deliverables whose context changed (equivalent to an ingest → build
  # pipeline). Convenient for an always-up-to-date wiki, but every ingest
  # then costs additional LLM calls.
  refreshOnIngest: false

retrieval:
  vector:
    enabled: true
    baseUrl: http://infinity.local:7997/v1
    apiKey: YOUR_VECTOR_API_KEY
    embeddingModel: BAAI/bge-m3
    rerankEnabled: true
    rerankerModel: BAAI/bge-reranker-v2-m3
    requestsPerMinute: 1000

mcp:
  # Optional: require clients to authenticate with this value.
  # Can also be set with WIKI_MCP_ACCESS_KEY, useful for Docker-only deployments.
  # accessKey: your-secret-key
  # Optional: enable HTTPS for `wiki mcp-http`.
  # Paths are relative to the workspace root, or absolute inside the container.
  # Can also be set with WIKI_MCP_TLS_CERT_PATH / WIKI_MCP_TLS_KEY_PATH / WIKI_MCP_TLS_CA_PATH.
  # tls:
  #   certPath: certs/fullchain.pem
  #   keyPath: certs/privkey.pem
  #   caPath: certs/ca.pem
