# Minimal preset form. A preset is only a shortcut; every value below can still
# be overridden explicitly in this file.
preset: ollama
language: en

llm:
  model: YOUR_MODEL_NAME

# Generic provider form, useful for any OpenAI-compatible endpoint and for
# separate embedding/rerank services. Uncomment and remove `preset` above.
# language: en
# llm:
#   provider: openai-compatible
#   baseUrl: https://mon-provider.example.com/v1
#   model: leur-modele-32b
#   apiKeyEnv: MON_PROVIDER_API_KEY
# limits:
#   requestsPerMinute: 60
# retrieval:
#   vector:
#     enabled: true
#     baseUrl: http://infinity.local:7997/v1
#     apiKeyEnv: INFINITY_API_KEY
#     embeddingModel: BAAI/bge-m3
#     rerankEnabled: true
#     rerankerModel: BAAI/bge-reranker-v2-m3
#     requestsPerMinute: 1000

# Ollama-specific options live here only when you need them explicitly.
# For remote/Docker Ollama, set them here since the server env cannot be auto-detected.
# llm:
#   flashAttention: true
#   kvCacheType: q8_0

build:
  refreshOnIngest: false
  # slotBatchSize: 8 # optional compatibility ceiling; token budget batches first
  maxBuildContextChars: 24000

limits:
  requestsPerMinute: 50
  targetInputTokensPerCall: 40000
  maxInputTokensPerCall: 50000
  maxProfileChars: 4000
  # Optional daily budget shown by `wiki build --plan`.
  # dailyInputTokens: 1000000

retrieval:
  maxContextFiles: 5
  maxChunksPerPage: 2
  maxChunkChars: 3000
  maxSourceChars: 8000
  buildStrategy: bm25
  vector:
    enabled: false
    # Defaults to llm.baseUrl. Set this when embeddings/reranking use a separate service.
    # baseUrl: http://127.0.0.1:7997/v1
    # apiKeyEnv: YOUR_VECTOR_API_KEY
    # requestsPerMinute: 1000
    timeoutMs: 600000
    embeddingModel: BAAI/bge-m3
    rerankEnabled: false
    rerankerModel: BAAI/bge-reranker-v2-m3
    topK: 48
    rerankTopK: 24
    maxResults: 6

mcp:
  # Optional: require clients to authenticate with this value.
  # Can also be set with WIKI_MCP_ACCESS_KEY, useful for Docker-only deployments.
  # accessKey: your-secret-key
  # Optional: enable HTTPS for `wiki mcp-http`.
  # Paths are relative to the workspace root, or absolute inside the container.
  # Can also be set with WIKI_MCP_TLS_CERT_PATH / WIKI_MCP_TLS_KEY_PATH / WIKI_MCP_TLS_CA_PATH.
  # tls:
  #   certPath: certs/fullchain.pem
  #   keyPath: certs/privkey.pem
  #   caPath: certs/ca.pem
