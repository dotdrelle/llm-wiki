name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: "! git grep -nE '(apiKey|accessKey)\\s*:\\s*(sk-|eyJ)'"
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run check-file-sizes
      - run: pnpm test
      - run: pnpm run build
